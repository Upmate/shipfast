services:
  api:
    build: ../../apps/api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://shipfast:shipfast@db:5432/shipfast
      - REDIS_URL=redis://redis:6379

  web:
    build: ../../apps/web
    ports:
      - "5173:80"
    depends_on:
      - api

  worker:
    build: ../../apps/worker
    ports:
      - "8081:8081"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

  marketing:
    build: ../../apps/marketing
    ports:
      - "8082:80"

  auth:
    build: ../../services/auth
    ports:
      - "8090:8090"

  notifications:
    build: ../../services/notifications
    ports:
      - "8091:8091"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shipfast
      POSTGRES_USER: shipfast
      POSTGRES_PASSWORD: shipfast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
