apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shipfast-admin
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shipfast-admin-binding
subjects:
  - kind: Group
    name: shipfast-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: shipfast-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shipfast-deployer
  namespace: shipfast
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shipfast-deployer-binding
  namespace: shipfast
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: shipfast
roleRef:
  kind: Role
  name: shipfast-deployer
  apiGroup: rbac.authorization.k8s.io
